# Pull Request Maker MCP - Configuration
#
# Copy this file to config.yaml and fill in your credentials.
# IMPORTANT: Never commit config.yaml to version control — it contains secrets.
#
# Quick start:
#   make copy-config   → copies this file to config.yaml
#   Fill in auth, gchat, and adjust project paths to match your local setup.

auth:
  bitbucket:
    # Option 1 (Recommended): Atlassian API Token
    # Create at: https://id.atlassian.com/manage-profile/security/api-tokens
    email: "your-atlassian-email@example.com"
    api_token: "ATATT3x..."

    # Option 2 (Legacy): Bitbucket App Password
    # Create at: https://bitbucket.org/account/settings/app-passwords/
    # Required permissions: Repositories (Read), Pull requests (Read + Write)
    # username: "your-bitbucket-username"
    # app_password: "your-app-password"

gchat:
  # Incoming webhook URL for the Google Chat space.
  # Create at: Google Chat space → Apps & integrations → Webhooks → Add webhook
  webhook_url: "https://chat.googleapis.com/v1/spaces/XXXXX/messages?key=...&token=..."
  # Base URL for Jira ticket links — used to auto-generate links from branch names.
  jira_base_url: "https://your-org.atlassian.net/browse"

  # Map Bitbucket authors to their email addresses for display in Google Chat mentions.
  # When a PR notification is sent, the author's email will be displayed in the message.
  #
  # Lookup order: bitbucket_name (case-insensitive) → bitbucket_uuid (fallback)
  user_mappings:
    - bitbucket_name: "Bagus Prasetyo"
      email: "bagus@example.com"
    - bitbucket_name: "Alfin Barriky"
      email: "alfin@example.com"
    - bitbucket_name: "Michael Anthony Hadirahardja"
      email: "michael@example.com"
    - bitbucket_name: "Muhammad Mujir"
      email: "mujir@example.com"
    - bitbucket_name: "Maulana Ibrahim"
      email: "maulana@example.com"
    - bitbucket_name: "Wendy Thedy"
      email: "wendy@example.com"
    # You can also map by Bitbucket UUID as a fallback (optional):
    # - bitbucket_uuid: "{abc123-def456-...}"
    #   email: "user@example.com"

# Map repositories to their review instructions, guidelines, and PR defaults.
# Use "*" as repo_slug for a default/fallback configuration.
#
# Reviewer UUIDs: run this to find them:
#   curl -u "email:api_token" "https://api.bitbucket.org/2.0/workspaces/{workspace}/members?pagelen=100"
projects:
  # TDA
  - repo_slug: "mid-kelola-indonesia/talenta-data-api"
    review_instructions: "/path/to/mcp/pull_request_maker_mcp/review_instructions/go-code-review-instruction.md"
    project_guidelines: "/path/to/talenta-data-api/.github/copilot-instructions.md"
    default_target_branch: "master"
    description_mode: "concise"   # "comprehensive" or "concise"
    pr_description_template: "/path/to/mcp/pull_request_maker_mcp/pr_templates/concise.md"
    default_reviewers:            # Bitbucket user UUIDs — include curly braces
      - "{uuid-reviewer-1}"
      - "{uuid-reviewer-2}"
    close_source_branch: false
    gchat_webhook_url: ""         # optional: overrides global gchat.webhook_url for this repo

  # Disbursement Service
  - repo_slug: "mid-kelola-indonesia/disbursement-service"
    review_instructions: "/path/to/mcp/pull_request_maker_mcp/review_instructions/go-code-review-instruction.md"
    project_guidelines: "/path/to/disbursement-service/.github/copilot-instructions.md"
    default_target_branch: "master"
